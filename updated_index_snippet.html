
<!-- FLOATING CART BUTTON -->
<button id="floatingCartBtn" class="floating-cart-btn" onclick="toggleCart()">
  🛒 <span id="cartCount">0</span>
</button>

<!-- CART DRAWER -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

<div id="cartDrawer" class="cart-drawer">
  <div class="cart-header">
    <h2>Keranjang Belanja</h2>
    <button onclick="toggleCart()">✕</button>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <div class="cart-total">
      Total: <span id="cartTotal">Rp 0</span>
    </div>

    <button class="btn btn-primary" onclick="scrollToCheckout()">
      Lanjut ke Pembayaran
    </button>
  </div>
</div>

<!-- PRODUCT BUTTON UPDATE EXAMPLE -->
<button class="btn btn-secondary product-action"
onclick="addToCart('AGG MK-87', 300000)">
Tambah ke Keranjang
</button>

<!-- ORDER SUMMARY -->
<div id="cartSummaryList"></div>
